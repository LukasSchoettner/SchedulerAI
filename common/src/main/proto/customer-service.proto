syntax = "proto3";

import "google/protobuf/empty.proto";

option java_multiple_files = true;
option java_package = "com.scheduler.customermanagement.grpc.base";
option java_outer_classname = "CustomerServiceProto";

// --- Enums ---

// Mirror your commoncode.enums.MembershipLevel
enum MembershipLevel {
  BASIC    = 0;
  PLUS     = 1;
  PREMIUM  = 2;
}

// --- Messages ---

message CustomerRequest {
  int64 id = 1;
}

message CustomerProto {
  int64            id               = 1;
  string           customername     = 2;
  string           email            = 3;
  bool             active           = 4;
  MembershipLevel  membershipLevel  = 5;
  SchedulingPreferenceProto schedulingPreference = 6;
}

message CategoryIntTargetProto {
  string category = 1;
  int32 value = 2;
}

message CategoryBooleanSettingProto {
  string category = 1;
  bool value = 2;
}

message MinimumRequirementProto {
  string category = 1;
  string type = 2;
  int32 amount = 3;
  string period = 4;
}

message SchedulingPreferenceProto {
  int64 id = 1;
  string primaryPriority = 2;
  repeated string fixedCommitmentCategories = 3;
  string workFlexibility = 4;
  repeated string healthConstraints = 5;
  string allocationMode = 6;
  repeated CategoryIntTargetProto taskCountTargets = 7;
  int32 plannedHoursPerDayMinutes = 8;
  repeated CategoryIntTargetProto timeBudgetTargets = 9;
  string fixedTimeBudgetMode = 10;
  repeated CategoryBooleanSettingProto fixedTimeCountsByCategory = 11;
  repeated MinimumRequirementProto minimumRequirements = 12;
  int32 pauseMinutes = 13;
  string pauseOverloadBehavior = 14;
  string planningFullness = 15;
  repeated string overloadReductionOrder = 16;
  string temporaryMode = 17;
  string temporaryUntil = 18;
  repeated string categoryPriorityOrder = 19;
  repeated CategoryIntTargetProto categoryImportance = 20;
}

message CustomerList {
  repeated CustomerProto customers = 1;
}

message CustomerCreate {
  string           customername     = 1;
  string           email            = 2;
  string           password         = 3;
}

message CustomerUpdate {
  int64            id               = 1;
  string           customername     = 2;
  string           email            = 3;
  string           password         = 4;
  bool             active           = 5;
  MembershipLevel  membershipLevel  = 6;
}

message CustomerDeleteResponse {
  bool success = 1;
}

// --- Service ---

service CustomerService {
  // fetch one customer by ID
  rpc GetCustomerById (CustomerRequest) returns (CustomerProto);

  // list all customers
  rpc ListCustomers   (google.protobuf.Empty) returns (CustomerList);

  // create a new customer
  rpc CreateCustomer  (CustomerCreate)  returns (CustomerProto);

  // update existing; returns the updated customer
  rpc UpdateCustomer  (CustomerUpdate)  returns (CustomerProto);

  // delete by ID; returns success flag
  rpc DeleteCustomer  (CustomerRequest) returns (CustomerDeleteResponse);
}
