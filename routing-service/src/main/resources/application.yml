# routing-service/src/main/resources/application.yml
server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://postgres-routing:5432/routing_service_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  application:
    name: routing-service

grpc:
  server:
    address: 0.0.0.0      # 👈 important inside Docker, just like customer-service
    port: 9090
    security:
      enabled: false

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
